services:
  ui:
    image: draftpilot-ui
    build:
      context: .
      dockerfile: ./Dockerfile.ui
    ports:
      - 9000:8000
    command:
      [
        "uv",
        "run",
        "flet",
        "run",
        "--web",
        "--port",
        "8000",
        "src/draftpilot/ui/main.py",
      ]
    environment:
      - OTEL__EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - OTEL__ENABLED=true

  mcp:
    image: draftpilot-mcp
    build:
      context: .
      dockerfile: ./Dockerfile.mcp
    ports:
      - 9001:8000
    command:
      [
        "uv",
        "run",
        "fastmcp",
        "run",
        "src/draftpilot/mcp/server.py:mcp",
        "--transport",
        "http",
        "--port",
        "8000",
      ]
    environment:
      - OTEL__EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - OTEL__ENABLED=true

  grafana:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP/gRPC
      - "4318:4318" # OTLP/HTTP
    restart: unless-stopped
