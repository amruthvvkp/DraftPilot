[project]
name = "draftpilot"
version = "0.1.0"
description = "AI-powered screenplay editor and story development platform"
readme = "README.md"
authors = [{ name = "Amruth Vithala", email = "amruthvvkp@gmail.com" }]
license = { text = "MIT" }
keywords = ["screenplay", "screenwriting", "ai", "storytelling", "film"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: End Users/Desktop",
    "Topic :: Multimedia :: Video",
    "Topic :: Text Editors",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
requires-python = ">3.11"
dependencies = [
    "fastapi>=0.128.0",
    "httpx>=0.28.1",
    "logfire[fastapi]>=4.16.0",
    "pydantic>=2.12.4",
    "pydantic-ai>=1.39.0",
    "pydantic-settings>=2.11.0",
    "nicegui[redis]>=3.4.1",
    "fastmcp>=2.13.0.2",
    "uvicorn[standard]>=0.40.0",
]

[project.scripts]
# draftpilot = "draftpilot:main"

[project.urls]
Homepage = "https://github.com/amruthvvkp/DraftPilot"
# Documentation = "https://draftpilot.dev/docs"
Repository = "https://github.com/amruthvvkp/DraftPilot"
Issues = "https://github.com/amruthvvkp/DraftPilot/issues"

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "isort>=6.0.1",
    "jupyter>=1.1.1",
    "mypy>=1.17.1",
    "pre-commit>=4.3.0",
    { include-group = "lint" },
    { include-group = "test" },
    { include-group = "docs" },
]
lint = ["interrogate>=1.7.0", "ruff>=0.12.9"]
test = [
    "dirty-equals>=0.9.0",
    "pyhamcrest>=2.1.0",
    "pytest>=8.4.1",
    "pytest-asyncio>=0.24.0",
    "pytest-pretty>=1.3.0",
]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-autorefs>=1.4.2",
    "mkdocs-gen-files>=0.5.0",
    "mkdocs-material>=9.6.17",
    "mkdocs-panzoom-plugin>=0.3.0",
    "mkdocstrings[python]>=0.30.0",
]
